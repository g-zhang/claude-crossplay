name: Notify private tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Mint short-lived app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: g-zhang
          repositories: crossplay-private

      - name: Trigger crossplay-private test run
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: g-zhang/crossplay-private
          event-type: core-updated
          client-payload: '{"sha": "${{ github.sha }}"}'
