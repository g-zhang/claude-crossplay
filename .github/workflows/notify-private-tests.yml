name: Notify private tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate skill frontmatter
        run: ruby .github/scripts/validate_skills.rb

      - name: Mint short-lived app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: Iv23liOEX9WC4w75hy0x
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: g-zhang
          repositories: crossplay-private

      - name: Trigger crossplay-private test run
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: g-zhang/crossplay-private
          event-type: core-updated
          client-payload: '{"sha": "${{ github.sha }}"}'
