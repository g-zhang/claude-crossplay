name: Build and Release Skill

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate skill frontmatter
        shell: ruby {0}
        run: |
          require "yaml"

          allowed = %w[
            name description license allowed-tools metadata compatibility
          ]
          skills = {
            "src/SKILL.md" => "crossplay-solver",
            "core/SKILL.md" => "crossplay-solver-core",
          }

          skills.each do |path, expected_name|
            content = File.read(path, encoding: "UTF-8")
            match = content.match(/\A---\r?\n(.*?)\r?\n---(?:\r?\n|\z)/m)
            abort "#{path}: invalid YAML frontmatter" unless match

            frontmatter = YAML.safe_load(match[1], aliases: false)
            abort "#{path}: frontmatter must be a mapping" unless frontmatter.is_a?(Hash)

            unexpected = frontmatter.keys - allowed
            unless unexpected.empty?
              abort "#{path}: unexpected frontmatter keys: #{unexpected.sort.join(', ')}"
            end

            name = frontmatter["name"]
            abort "#{path}: expected name #{expected_name}" unless name == expected_name
            unless name.match?(/\A[a-z0-9]+(?:-[a-z0-9]+)*\z/) && name.length <= 64
              abort "#{path}: name must be kebab-case and at most 64 characters"
            end

            description = frontmatter["description"]
            unless description.is_a?(String) && !description.strip.empty?
              abort "#{path}: description must be a non-empty string"
            end
            if description.length > 1024 || description.include?("<") || description.include?(">")
              abort "#{path}: description violates skill metadata limits"
            end

            compatibility = frontmatter["compatibility"]
            if compatibility && (!compatibility.is_a?(String) || compatibility.length > 500)
              abort "#{path}: compatibility must be a string of at most 500 characters"
            end

            puts "#{path}: valid"
          end

      - name: Zip src/ into crossplay-solver.skill (bootstrap)
        run: |
          cp -r src crossplay-solver
          printf '\n---\n\n_Built from `%s` (`%s`) on `%s`._\n' \
            "${GITHUB_REF_NAME}" "${GITHUB_SHA}" "$(date -u +%Y-%m-%d)" \
            >> crossplay-solver/SKILL.md
          zip -r crossplay-solver.skill crossplay-solver/
          rm -rf crossplay-solver

      - name: Zip core/ into crossplay-solver-core.skill (offline)
        run: |
          cp -r core crossplay-solver-core
          printf '\n---\n\n_Built from `%s` (`%s`) on `%s`._\n' \
            "${GITHUB_REF_NAME}" "${GITHUB_SHA}" "$(date -u +%Y-%m-%d)" \
            >> crossplay-solver-core/SKILL.md
          zip -r crossplay-solver-core.skill crossplay-solver-core/
          rm -rf crossplay-solver-core

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crossplay-solver.skill
            crossplay-solver-core.skill
          generate_release_notes: true